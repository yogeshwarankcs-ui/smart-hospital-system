<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

<div class="dashboard-container">

    <h2>Welcome to Smart Hospital</h2>
    <p class="subtitle">Manage your healthcare services easily</p>

    <div class="dashboard-grid">

        <div class="card-box">
            <h3>📅 Book Appointment</h3>
            <p>Schedule your visit with doctors</p>
            <button onclick="alert('Appointment Page Coming Soon')">Open</button>
        </div>

        <div class="card-box">
            <h3>📄 View Appointments</h3>
            <p>Check your upcoming appointments</p>
            <button onclick="alert('View Appointments Page Coming Soon')">Open</button>
        </div>

        <div class="card-box">
            <h3>💊 Medical Records</h3>
            <p>Access prescriptions and reports</p>
            <button onclick="alert('Medical Records Page Coming Soon')">Open</button>
        </div>

        <div class="card-box logout">
            <h3>🚪 Logout</h3>
            <p>Securely exit your account</p>
            <button onclick="logout()">Logout</button>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
